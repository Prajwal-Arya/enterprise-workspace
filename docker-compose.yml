services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: enterprise
      POSTGRES_PASSWORD: enterprise_password
      POSTGRES_DB: enterprise_workspace
    ports:
      - "5432:5432"
    volumes:
      - enterprise_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - enterprise_redis_data:/data

volumes:
  enterprise_postgres_data:
  enterprise_redis_data:
